{% extends 'base.html'%}

{%block title%}
Sign Up Form
{%endblock%}
{%block content%}
<h1>Sign Up Form</h1>
<form action="/signup" method="POST">
    {{form.hidden_tag()}}

    {% for field in form if field.widget.input_type != 'hidden' %}


    <p>{{field.label}}
        {{field}}
    </p>

    
    {%endfor%}
    <button type="submit">Sign Up</button>
    
</form>
{%endblock%}
