{% extends 'base.html'%}
{%block title%}
Log In
{%endblock%}
{%block content%}
<h1>Log In Form</h1>
<form action="/login" method="POST">
    {{form.hidden_tag()}}

    {%for field in form if field.widget.input_type != 'hidden'%}

    <p>
        {{field.label}}
        {{field}}
    </p>

    {%endfor%}
    <div>
        <button type="submit">Login</button>
    </div>
</form>
{%endblock%}
