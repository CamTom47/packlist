{% extends 'base.html'%}
{%block title%}
Create Trip
{%endblock%}
{%block content%}
<h1>Create Trip Form</h1>
<form action="/trips/new" method="POST">
    {{form.hidden_tag()}}

    {%for field in form if field.widget.input_type != 'hidden'%}

    <p>
        {{field.label}}
        {{field}}
    </p>

    {%endfor%}
    <div>
        <button type="submit">Add Trip</button>
    </div>
</form>
{%endblock%}
