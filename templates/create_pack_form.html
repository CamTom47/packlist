{% extends 'base.html'%}
{%block title%}
Create Pack
{%endblock%}
{%block content%}
<h1>Create Pack Form</h1>

<div id="pack-form">
    <form action="/packs/new" method="POST">
    <div id="pack-section">

        
            {{form.hidden_tag()}}
            
            {%for field in form if field.widget.input_type != 'hidden'%}
            
            <p>
                {{field.label}}
                {{field}}
            </p>
            
            {%endfor%}
            
            
            
            <div>
                <button class="visually-hidden" type="submit" id="create-pack-button">Create New Pack</button>
            </div>
        </div>
        </form>
        
        <div>
            <button id="item-section-button">Add Some Items</button>
        </div>
</div>

<script src='../static/functionalities/pack.js'></script>
{%endblock%}
